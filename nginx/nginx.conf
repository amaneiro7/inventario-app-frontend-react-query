server {
    listen 80;
    server_name localhost;

    # Ocultar versión de Nginx por seguridad
    server_tokens off;

    # Compresión Gzip para reducir el tamaño de las transferencias
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Cabeceras de seguridad
    # Nota: HSTS se maneja usualmente en el proxy con SSL, pero estas ayudan en profundidad
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    root /usr/share/nginx/html;
    index index.html;

    # Caché agresivo para assets estáticos (Vite genera nombres con hash)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }
    
    location / {
        # No cachear el index.html para asegurar actualizaciones inmediatas
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Endpoint para healthchecks de Docker
    location /health {
        access_log off;
        return 200 "healthy\n";
    }
}
