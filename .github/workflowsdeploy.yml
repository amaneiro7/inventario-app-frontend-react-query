name: Build and Push Docker Image

on:
    push:
        branches: ['main'] # Se ejecuta al subir cambios a main

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout del código
              uses: actions/checkout@v4

            - name: Configurar Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login en Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extraer metadatos (Tags)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: tu-usuario/nombre-de-tu-app
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Construir y Empujar imagen
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  # Esto usa el cache de Docker para que las builds sean ultra rápidas
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # Opcional: Aquí podrías añadir un paso para avisar a tu servidor
            # que descargue la nueva imagen 'latest'.
